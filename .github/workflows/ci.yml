name: CI

on:
  push:
    branches: [master, main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: Verify Project
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: streamerhub
          POSTGRES_PASSWORD: streamerhub_password
          POSTGRES_DB: streamerhub_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check Format
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Run Database Migrations
        env:
          DATABASE_URL: postgresql://streamerhub:streamerhub_password@localhost:5432/streamerhub_test
        run: pnpm db:push

      - name: Test
        env:
          DATABASE_URL: postgresql://streamerhub:streamerhub_password@localhost:5432/streamerhub_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-jwt-secret-12345
          SESSION_SECRET: test-session-secret-12345
          TOKEN_ENCRYPTION_KEY: 1234567890123456789012345678901234567890123456789012345678901234
          TWITCH_CLIENT_ID: test_client_id
          TWITCH_CLIENT_SECRET: test_client_secret
          TWITCH_REDIRECT_URI: http://localhost:3000/api/v1/auth/callback
          DESKTOP_DEEP_LINK: streamerhub://auth/callback
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Verify Docker Compose config
        run: docker compose -f infrastructure/docker/docker-compose.yml config
