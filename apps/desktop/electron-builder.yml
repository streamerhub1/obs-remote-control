appId: com.streamerhub.obsremote
productName: StreamerHub
directories:
  buildResources: build
  output: release
files:
  - dist
  - package.json
win:
  target:
    - target: nsis
      arch:
        - x64

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  artifactName: ${productName}-Setup-${version}.${ext}
